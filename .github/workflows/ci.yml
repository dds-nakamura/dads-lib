name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # No `version:` here — pnpm/action-setup@v4 reads the exact version
        # from the `packageManager` field in package.json (pnpm@11.1.1).
        # Specifying both triggers ERR_PNPM_BAD_PM_VERSION on newer runners.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the workspace libraries first so their declaration files exist
      # before typecheck. `@dads/vue` の `types` は `dist/index.d.ts` を指すため、
      # これを先に生成しないと依存パッケージ（sample-app/frontend など）の
      # `vue-tsc --noEmit` が `Cannot find module '@dads/vue'` で失敗する。
      - name: Build libraries (@dads/tokens, @dads/vue)
        run: |
          pnpm --filter @dads/tokens build
          pnpm --filter @dads/vue build

      - name: Typecheck
        run: pnpm -w run typecheck

      - name: Lint
        run: pnpm -w run lint

      - name: Format check
        run: pnpm -w run format:check

      - name: Test (@dads/vue) — Vitest + vitest-axe
        run: pnpm --filter @dads/vue test

      - name: Build (@dads/docs) — VitePress static
        run: pnpm --filter @dads/docs build
